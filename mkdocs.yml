site_name: prox
site_url: https://dortanes.github.io/prox
site_description: Modular reverse proxy with config-driven routing, load balancing, L4/L7 dispatching, and plugin middleware.
repo_url: https://github.com/dortanes/prox
repo_name: dortanes/prox
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.action.edit
  icon:
    repo: fontawesome/brands/github
  font:
    text: Inter
    code: JetBrains Mono

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Configuration:
    - Overview: configuration/index.md
    - Routing: configuration/routing.md
    - Actions: configuration/actions.md
    - Load Balancing: configuration/load-balancing.md
    - Speed Limiting: configuration/speed-limiting.md
    - Logging: configuration/logging.md
  - Admin API: admin-api.md
  - TLS & Certificates: tls.md
  - Plugins:
    - Overview: plugins/index.md
    - Go SDK: plugins/sdk.md
    - Wire Protocol: plugins/protocol.md
  - Deployment: deployment.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - def_list

plugins:
  - search

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/dortanes/prox
