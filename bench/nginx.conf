worker_processes auto;
error_log /dev/null crit;

events {
    worker_connections 4096;
    multi_accept on;
}

http {
    access_log off;
    keepalive_timeout 65;

    upstream backend {
        server 127.0.0.1:9877;
        keepalive 256;
    }

    server {
        listen 9876;
        location / {
            proxy_pass http://backend;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
        }
    }
}
